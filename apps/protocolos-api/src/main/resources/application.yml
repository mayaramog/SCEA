spring:
  application:
    name: protocolos-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/scea?currentSchema=protocolos
    username: postgres
    password: "1234"
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    schemas: protocolos
    default-schema: protocolos
    create-schemas: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: protocolos
        format_sql: true
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: 5672
    username: guest
    password: guest
  cloud:
    stream:
      bindings:
        protocolos-out-0:
          destination: protocolos.exchange
          group: protocolos-group
  task:
    scheduling:
      pool:
        size: 5

server:
  port: 8082

eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
