spring:
  application:
    name: notification-worker
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/scea
    username: postgres
    password: "1234"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: 5672
    username: guest
    password: guest
  cloud:
    stream:
      bindings:
        consumeProtocolSubmitted-in-0:
          destination: protocolos.exchange
          group: notification-worker-group
        consumeProtocolApproved-in-0:
          destination: protocolos.exchange
          group: notification-worker-group
      function:
        definition: consumeProtocolSubmitted;consumeProtocolApproved

server:
  port: 8083

eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/

