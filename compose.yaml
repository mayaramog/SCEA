services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: scea
      POSTGRES_PASSWORD: "1234"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build:
      context: .
      dockerfile: apps/eureka-server/Dockerfile
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  protocolos-api:
    build:
      context: .
      dockerfile: apps/protocolos-api/Dockerfile
    environment:
      - DB_HOST=postgres
      - RABBIT_HOST=rabbitmq
      - EUREKA_HOST=eureka-server
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

  atores-api:
    build:
      context: .
      dockerfile: apps/atores-api/Dockerfile
    environment:
      - DB_HOST=postgres
      - EUREKA_HOST=eureka-server
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started

  notification-worker:
    build:
      context: .
      dockerfile: apps/notification-worker/Dockerfile
    environment:
      - DB_HOST=postgres
      - RABBIT_HOST=rabbitmq
      - EUREKA_HOST=eureka-server
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - EUREKA_HOST=eureka-server
    depends_on:
      eureka-server:
        condition: service_started
